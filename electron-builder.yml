appId: com.ikan.downloader
productName: Gallery-UI
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - src/background.cjs
  - src/preload.cjs
  - '!**/*.{md,txt}'
  - '!**/LICENSE*'
extraResources:
  - from: bin/gallery-dl.exe
    to: gallery-dl.exe
asar: true
asarUnpack:
  - src/background.cjs
  - src/preload.cjs
electronLanguages: ['zh-CN', 'en-US']
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  signAndEditExecutable: false
nsis:
  artifactName: ${productName}-v${version}-win-x64-setup.exe
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Gallery-UI
portable:
  artifactName: ${productName}-v${version}-win-x64.exe
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
compression: maximum
