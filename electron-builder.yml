appId: com.ikan.downloader
productName: Gallery-UI
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - src/background.cjs
  - src/preload.cjs
  - '!**/*.{md,txt}'
  - '!**/LICENSE*'
extraResources:
  - from: bin/gallery-dl.exe
    to: gallery-dl.exe
asar: true
asarUnpack:
  - src/background.cjs
  - src/preload.cjs
electronLanguages: ['zh-CN', 'en-US']
win:
  target:
    - target: portable
      arch:
        - x64
  signAndEditExecutable: false
portable:
  artifactName: ${productName}-${version}-portable.exe
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/
compression: maximum
